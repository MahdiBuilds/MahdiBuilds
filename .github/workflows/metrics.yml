name: Generate Profile Metrics

on:
  schedule:
    - cron: "35 1 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          user: MahdiBuilds
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/isocalendar.svg
          template: terminal
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Generate repository language metrics
        uses: lowlighter/metrics@latest
        with:
          user: MahdiBuilds
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/languages.svg
          template: terminal
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

      - name: Generate starred topics
        uses: lowlighter/metrics@latest
        with:
          user: MahdiBuilds
          token: NOT_NEEDED
          filename: assets/metrics/topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_sort: activity
          plugin_topics_limit: 12
